name: Patch target vbmeta

on:
  workflow_dispatch:
    inputs:
      codename:
        description: Choose device
        required: true
        type: choice
        options:
          - e1s
          - a26x
          - a35x

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone AVBtool from source
        run: |
          git clone https://android.googlesource.com/platform/external/avb

      - name: Patch Target vbmeta
        run: |
          cp "target/${{ github.event.inputs.codename }}/vbmeta.img" "target/${{ github.event.inputs.codename }}/vbmeta_patched.img" && printf "$(printf '\\x%02X' 3)" | dd of="target/${{ github.event.inputs.codename }}/vbmeta_patched.img" bs=1 seek=123 count=1 conv=notrunc &> /dev/null
          sha256sum "target/${{ github.event.inputs.codename }}/vbmeta_patched.img" | tee "target/${{ github.event.inputs.codename }}/vbmeta_patched.img.sha256"
          shasum=$(awk '{print $1}' "target/${{ github.event.inputs.codename }}/vbmeta_patched.img.sha256")
          echo "shasum=$shasum" >> "$GITHUB_ENV"

      - name: Verify if vbmeta has been patched successfully
        run: |
          python3 avb/avbtool.py info_image --image "target/${{ github.event.inputs.codename }}/vbmeta_patched.img" | tee "target/${{ github.event.inputs.codename }}/vbinfo.txt"
          grep -q "Flags:[[:space:]]*3" "target/${{ github.event.inputs.codename }}/vbinfo.txt" || { echo "patch failed"; exit 1; }
          pflag=$(grep "^Flags:" "target/${{ github.event.inputs.codename }}/vbinfo.txt" | awk '{print $2}')
          echo "pflag=$pflag" >> "$GITHUB_ENV"

      - name: read firmware information
        run: |
          test -s "target/${{ github.event.inputs.codename }}/.firmware" || { echo ".firmware missing or empty"; exit 1; }
          fw=$(sed -n '1p' "target/${{ github.event.inputs.codename }}/.firmware" | tr -d '\r\n')
          fp=$(sed -n '2p' "target/${{ github.event.inputs.codename }}/.firmware" | tr -d '\r\n')
          echo "fw=$fw" >> "$GITHUB_ENV"
          echo "fp=$fp" >> "$GITHUB_ENV"

      - name: Tar the patched vbmeta
        run: |
          mkdir -p tmp
          cp "target/${{ github.event.inputs.codename }}/vbmeta_patched.img" tmp/vbmeta.img
          tar -cf "target/${{ github.event.inputs.codename }}/vbmeta_patched_${{ env.build }}.tar" -C tmp vbmeta.img
          rm -rf tmp

      - name: Upload to releases
        uses: actions/upload-artifact@v4
        with:
          name: vbmeta_patched_${{ github.event.inputs.codename }}
          path: target/${{ github.event.inputs.codename }}/vbmeta_patched.img

      - name: Create releases
        uses: ncipollo/release-action@v1
        with:
          tag: release-${{ github.run_number }}
          name: ${{ github.event.inputs.codename }}-${{ github.run_number }}
          artifacts: target/${{ github.event.inputs.codename }}/vbmeta_patched.img
          prerelease: false
          body: |
            Patched vbmeta for device: `${{ github.event.inputs.codename }}`
            **AVB patched Flag:** `${{ env.pflag }}`
            **SHA-256:** `${{ steps.sha256.outputs.sum }}`
            **Firmware build:** `${{ env.build }}`
            **Fingerprint:** `${{ env.fingerprint }}`